on:
  push:
    branches:
      - main
 
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
 
    steps:
      # ── 1. Obtener código ────────────────────────────────────────────────────
      - name: Checkout del repositorio
        uses: actions/checkout@v4
 
      # ── 2. Configurar JDK 21 ─────────────────────────────────────────────────
      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
 
      # ── 3. Compilar con Maven ────────────────────────────────────────────────
      - name: Build con Maven
        run: mvn clean package -DskipTests
 
      # ── 4. Login en Docker Hub ───────────────────────────────────────────────
      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
 
      # ── 5. Construir imagen Docker ───────────────────────────────────────────
      - name: Build imagen Docker
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ms-docucloud:latest .
 
      # ── 6. Publicar imagen en Docker Hub ─────────────────────────────────────
      - name: Push imagen a Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ms-docucloud:latest
 
      # ── 7. Desplegar en EC2 vía SSH ──────────────────────────────────────────
      - name: Deploy en EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ms-docucloud:latest
            docker stop ms-docucloud || true
            docker rm   ms-docucloud || true
            docker run -d \
              --name ms-docucloud \
              -p 8080:8080 \
              -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
              -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              -e AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }} \
              -e AWS_REGION=${{ secrets.AWS_REGION }} \
              -e AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }} \
              -e EFS_PATH=/app/efs \
              -v /mnt/efs:/app/efs \
              ${{ secrets.DOCKERHUB_USERNAME }}/ms-docucloud:latest
